<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root {
      --pink: #ec4899;
      --pink-light: #f9a8d4;
      --purple: #a855f7;
      --purple-deep: #7c3aed;
      --bg-dark: #0f0a1a;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.08);
      --text: #f0e6ff;
      --text-muted: #a78bcc;
      --glow-pink: rgba(236,72,153,0.35);
      --glow-purple: rgba(168,85,247,0.35);
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(168,85,247,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(236,72,153,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(124,58,237,0.06) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 {
      font-size: 3rem; font-weight: 800;
      background: linear-gradient(135deg, var(--pink-light), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { font-size: 1rem; color: var(--text-muted); margin-top: 0.5rem; }
    .game-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem; max-width: 700px; width: 100%; padding: 0 1rem;
    }
    .game-card {
      padding: 2rem; border-radius: 24px;
      background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(12px); text-align: center;
      cursor: pointer; transition: all 0.3s;
      text-decoration: none; color: var(--text);
    }
    .game-card:hover {
      transform: translateY(-6px); border-color: var(--purple);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3), 0 0 30px var(--glow-purple);
    }
    .game-card .icon { font-size: 3.5rem; margin-bottom: 0.75rem; }
    .game-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.4rem; }
    .game-card p { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
    .game-card .badge {
      display: inline-block; margin-top: 0.75rem; padding: 0.3rem 0.8rem;
      border-radius: 999px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px;
    }
    .badge-new { background: linear-gradient(135deg, var(--pink), var(--purple-deep)); color: #fff; }
    .badge-classic { background: rgba(168,85,247,0.15); color: var(--purple); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Royal Games</h1>
    <p>Choose your challenge</p>
  </div>
  <div class="game-grid">
    <a class="game-card" href="tictactoe.html">
      <div class="icon">&#9818; &#9819;</div>
      <h2>Royal Tic-Tac-Toe</h2>
      <p>King vs Queen with power-ups, 3x3 and 4x4 boards, and AI opponent</p>
      <span class="badge badge-classic">Updated</span>
    </a>
    <a class="game-card" href="memory.html">
      <div class="icon">&#9816; &#9822;</div>
      <h2>Royal Memory Match</h2>
      <p>Flip cards to find matching chess piece pairs. Test your memory!</p>
      <span class="badge badge-new">New</span>
    </a>
  </div>
</body>
</html>
